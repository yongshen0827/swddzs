name: 打包 macOS x86_64 应用 (Intel 原生，兼容 Apple Silicon)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15-intel

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 下载 OCR 模型 (带重试)
      uses: nick-fields/retry@v2
      with:
        timeout_minutes: 10
        max_attempts: 3
        retry_on: error
        command: |
          python -c "
          from paddleocr import PaddleOCR
          import easyocr
          PaddleOCR(use_angle_cls=True, lang='ch', show_log=False)
          easyocr.Reader(['ch_sim', 'en'], gpu=False)
          print('✅ 模型下载完成')
          "

    - name: 清理旧构建
      run: rm -rf build dist *.spec.bak *.zip

    - name: PyInstaller 打包
      run: |
        pyinstaller --clean --noconfirm build_mac.spec

    - name: 验证打包产物
      run: |
        if [ ! -d "dist/商委订单审核助手服务端.app" ]; then
          echo "❌ .app 未生成"
          exit 1
        fi
        echo "✅ .app 生成成功"
        ls -la dist/

    - name: 压缩 .app 为 zip
      run: |
        cd dist
        zip -r ../OrderAuditApp-macOS.zip "商委订单审核助手服务端.app"
        cd ..

    - name: 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: macOS-App
        path: OrderAuditApp-macOS.zip

  test:
    name: 🧪 测试 (${{ matrix.os }})
    needs: build
    strategy:
      matrix:
        os: [macos-15-intel, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15  # 整个 job 超时
    steps:
    - name: 下载产物
      uses: actions/download-artifact@v4
      with:
        name: macOS-App

    - name: 诊断 CPU 特性
      run: |
        echo "===== 当前测试环境: ${{ matrix.os }} ====="
        sysctl -n machdep.cpu.brand_string 2>/dev/null || echo "⚠️ 无法获取 CPU 品牌"

    - name: 解压并测试
      run: |
        unzip -q OrderAuditApp-macOS.zip
        APP_PATH="./商委订单审核助手服务端.app"
        EXEC_PATH="$APP_PATH/Contents/MacOS/main"
        chmod +x "$EXEC_PATH"
        
        echo "===== 架构 ====="
        file "$EXEC_PATH"
        
        echo "===== 环境变量 ====="
        export MKL_DEBUG_CPU_TYPE=5
        export MKL_ENABLE_INSTRUCTIONS=SSE4_2
        export OPENBLAS_NUM_THREADS=1
        export OMP_NUM_THREADS=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        
        echo "🚀 启动服务..."
        # 使用 timeout 命令防止僵死，360 秒足够
        timeout 360 "$EXEC_PATH" > server.log 2>&1 &
        SERVER_PID=$!
        
        echo "⏳ 等待服务就绪 (最多 360 秒)..."
        for i in {1..180}; do
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            wait $SERVER_PID
            EXIT_CODE=$?
            echo "❌ 服务进程退出，退出码: $EXIT_CODE"
            echo "===== 服务日志 ====="
            cat server.log
            exit 1
          fi
          if curl -s -f http://127.0.0.1:5678/health > /dev/null 2>&1; then
            echo "✅ 服务启动成功！"
            kill $SERVER_PID
            exit 0
          fi
          sleep 2
        done
        
        echo "❌ 超时未就绪"
        echo "===== 服务日志 ====="
        cat server.log
        kill $SERVER_PID 2>/dev/null || true
        exit 1
