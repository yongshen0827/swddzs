name: 打包 macOS x86_64 应用 (Intel 原生，兼容 Apple Silicon)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15-intel

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 下载 OCR 模型 (带重试)
      uses: nick-fields/retry@v2
      with:
        timeout_minutes: 10
        max_attempts: 3
        retry_on: error
        command: |
          python -c "
          from paddleocr import PaddleOCR
          import easyocr
          PaddleOCR(use_angle_cls=True, lang='ch', show_log=False)
          easyocr.Reader(['ch_sim', 'en'], gpu=False)
          print('✅ 模型下载完成')
          "

    - name: 清理旧构建
      run: rm -rf build dist *.spec.bak *.zip

    - name: PyInstaller 打包
      run: |
        pyinstaller --clean --noconfirm build_mac.spec

    - name: 验证打包产物
      run: |
        if [ ! -d "dist/商委订单审核助手服务端.app" ]; then
          echo "❌ .app 未生成"
          exit 1
        fi
        echo "✅ .app 生成成功"
        ls -la dist/

    - name: 压缩 .app 为 zip
      run: |
        cd dist
        zip -r ../OrderAuditApp-macOS.zip "商委订单审核助手服务端.app"
        cd ..

    - name: 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: macOS-App
        path: OrderAuditApp-macOS.zip

  test:
    name: 🧪 测试 (${{ matrix.os }})
    needs: build
    strategy:
      matrix:
        os: [macos-15-intel, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
    - name: 下载产物
      uses: actions/download-artifact@v4
      with:
        name: macOS-App

    - name: 诊断 CPU 特性（容错）
      run: |
        echo "===== 当前测试环境: ${{ matrix.os }} ====="
        echo "===== CPU 品牌 ====="
        sysctl -n machdep.cpu.brand_string 2>/dev/null || echo "⚠️ 无法获取 CPU 品牌（虚拟环境正常现象）"
        echo "===== CPU 特性 ====="
        sysctl -a 2>/dev/null | grep machdep.cpu.features || echo "⚠️ 无法获取 CPU 特性"

    - name: 解压并测试
      run: |
        unzip -q OrderAuditApp-macOS.zip
        APP_PATH="./商委订单审核助手服务端.app"
        EXEC_PATH="$APP_PATH/Contents/MacOS/main"
        chmod +x "$EXEC_PATH"
        
        echo "===== 1. 检查可执行文件架构 ====="
        file "$EXEC_PATH"
        
        echo "===== 2. 设置兼容性环境变量 ====="
        export MKL_DEBUG_CPU_TYPE=5
        export MKL_ENABLE_INSTRUCTIONS=SSE4_2
        export OPENBLAS_NUM_THREADS=1
        export GOTO_NUM_THREADS=1
        export OMP_NUM_THREADS=1
        export PYTHONHASHSEED=0
        export KMP_DUPLICATE_LIB_OK=TRUE
        
        echo "🚀 3. 启动服务..."
        "$EXEC_PATH" > server.log 2>&1 &
        SERVER_PID=$!
        
        echo "⏳ 4. 等待服务启动 (最多 180 秒)..."
        for i in {1..90}; do
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "❌ 服务进程已退出"
            echo "===== 服务日志 (最后 100 行) ====="
            tail -100 server.log
            exit 1
          fi
          if curl -s -f http://127.0.0.1:5678/health > /dev/null 2>&1; then
            echo "✅ 服务启动成功！健康检查通过 (耗时约 $((i*2)) 秒)"
            kill $SERVER_PID
            exit 0
          fi
          sleep 2
        done
        
        echo "❌ 服务启动超时"
        echo "===== 服务日志 (全部) ====="
        cat server.log
        kill $SERVER_PID 2>/dev/null || true
        exit 1
