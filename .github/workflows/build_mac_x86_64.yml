name: 打包 macOS x86_64 应用 (Intel 原生，兼容 Apple Silicon)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15-intel

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 下载 OCR 模型 (带重试)
      uses: nick-fields/retry@v2
      with:
        timeout_minutes: 10
        max_attempts: 3
        retry_on: error
        command: |
          python -c "
          from paddleocr import PaddleOCR
          import easyocr
          PaddleOCR(use_angle_cls=True, lang='ch', show_log=False)
          easyocr.Reader(['ch_sim', 'en'], gpu=False)
          print('✅ 模型下载完成')
          "

    - name: 清理旧构建
      run: rm -rf build dist *.spec.bak *.zip

    - name: PyInstaller 打包
      run: |
        pyinstaller --clean --noconfirm build_mac.spec

    - name: 验证打包产物
      run: |
        if [ ! -d "dist/商委订单审核助手服务端.app" ]; then
          echo "❌ .app 未生成"
          exit 1
        fi
        echo "✅ .app 生成成功"
        ls -la dist/

    - name: 压缩 .app 为 zip
      run: |
        cd dist
        zip -r ../OrderAuditApp-macOS.zip "商委订单审核助手服务端.app"
        cd ..

    - name: 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: macOS-App
        path: OrderAuditApp-macOS.zip

  test:
    name: 🧪 测试应用启动和接口
    needs: build
    runs-on: macos-14
    steps:
    - name: 下载产物
      uses: actions/download-artifact@v4
      with:
        name: macOS-App

    - name: 解压并诊断启动
      run: |
        unzip -q OrderAuditApp-macOS.zip
        APP_PATH="./商委订单审核助手服务端.app"
        EXEC_PATH="$APP_PATH/Contents/MacOS/main"
        chmod +x "$EXEC_PATH"
        
        echo "===== 1. 检查可执行文件架构 ====="
        file "$EXEC_PATH"
        
        echo "===== 2. 检查依赖动态库 ====="
        otool -L "$EXEC_PATH" | head -30
        
        echo "===== 3. 列出打包的模型文件 ====="
        ls -la "$APP_PATH/Contents/Resources/.paddleocr" 2>/dev/null || echo "⚠️ 未找到 .paddleocr 目录"
        ls -la "$APP_PATH/Contents/Resources/.EasyOCR" 2>/dev/null || echo "⚠️ 未找到 .EasyOCR 目录"
        
        echo "🚀 4. 启动服务（实时输出日志）..."
        # 使用 unbuffer 方式直接运行，日志实时打印到终端
        "$EXEC_PATH" 2>&1 &
        SERVER_PID=$!
        
        echo "⏳ 等待服务启动 (最多 180 秒)..."
        for i in {1..90}; do
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "❌ 服务进程已退出 (退出码: $?)"
            break
          fi
          if curl -s -f http://127.0.0.1:5678/health > /dev/null 2>&1; then
            echo "✅ 服务启动成功！健康检查通过。"
            kill $SERVER_PID
            exit 0
          fi
          sleep 2
        done
        
        echo "❌ 服务启动失败，终止进程并输出剩余日志..."
        kill $SERVER_PID 2>/dev/null || true
        exit 1
