name: 打包 macOS ARM64 应用

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        architecture: 'arm64'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install --only-binary=all paddlepaddle==3.0.0rc0 -i https://www.paddlepaddle.org.cn/packages/stable/cpu/
        pip install -r requirements.txt

    - name: 下载 OCR 模型 (带重试)
      uses: nick-fields/retry@v2
      with:
        timeout_minutes: 10
        max_attempts: 3
        retry_on: error
        command: |
          # 设置关键环境变量
          export MKL_DEBUG_CPU_TYPE=5
          export MKL_ENABLE_INSTRUCTIONS=SSE4_2
          export OPENBLAS_NUM_THREADS=1
          export OMP_NUM_THREADS=1
          export KMP_DUPLICATE_LIB_OK=TRUE
          
          # 执行模型下载
          python -c "
          import paddleocr
          import easyocr
          # 使用 3.x 风格初始化
          paddleocr.PaddleOCR(lang='ch', ocr_version='PP-OCRv4', use_textline_orientation=True)
          easyocr.Reader(['ch_sim', 'en'], gpu=False)
          print('✅ 模型下载完成')
          "

    - name: 清理旧构建
      run: rm -rf build dist *.spec.bak *.zip

    - name: PyInstaller 打包
      run: |
          export POCL_DEBUG=1
          pyinstaller --clean --noconfirm build_mac.spec

    - name: 验证打包产物
      run: |
        if [ ! -d "dist/商委订单审核助手服务端.app" ]; then
          echo "❌ .app 未生成"
          exit 1
        fi
        echo "✅ .app 生成成功"
        ls -la dist/

    - name: 压缩 .app 为 zip
      run: |
        cd dist
        zip -r ../OrderAuditApp-macOS.zip "商委订单审核助手服务端.app"
        cd ..

    - name: 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: macOS-App
        path: OrderAuditApp-macOS.zip

  test:
    name: 🧪 测试 (macOS ARM64)
    needs: build
    runs-on: macos-14
    timeout-minutes: 20
    steps:
    - name: 下载产物
      uses: actions/download-artifact@v4
      with:
        name: macOS-App

    - name: 解压并测试
      run: |
        set +e   # 允许命令失败而不立即退出脚本
        
        unzip -q OrderAuditApp-macOS.zip
        APP_PATH="./商委订单审核助手服务端.app"
        EXEC_PATH="$APP_PATH/Contents/MacOS/main"
        chmod +x "$EXEC_PATH"
        
        echo "=============================================="
        echo "📋 测试环境: macOS ARM64 (macos-14)"
        echo "=============================================="
        
        echo ""
        echo "🔍 1. 架构检测"
        echo "----------------------------------------------"
        uname -m
        file "$EXEC_PATH"
        arch -arm64 echo "   ✅ 当前 shell 运行于 ARM64 模式"
        
        echo ""
        echo "🔍 2. 动态库依赖分析"
        echo "----------------------------------------------"
        otool -L "$EXEC_PATH" | head -20
        if [ -d "$APP_PATH/Contents/MacOS/paddle/libs" ]; then
          echo "   📦 Paddle libs 目录内容:"
          ls -la "$APP_PATH/Contents/MacOS/paddle/libs" | head -10
        else
          echo "   ⚠️ 未找到 paddle/libs 目录"
          ls -la "$APP_PATH/Contents/MacOS/paddle" 2>/dev/null || echo "   (paddle 目录不存在)"
        fi
        
        echo ""
        echo "🔍 3. PyInstaller 资源目录结构"
        echo "----------------------------------------------"
        ls -la "$APP_PATH/Contents/MacOS/_internal" 2>/dev/null | head -20 || echo "   (无 _internal 目录)"
        
        echo ""
        echo "=============================================="
        echo "🚀 4. 启动服务"
        echo "=============================================="
        
        # 设置完整的环境变量
        export MKL_DEBUG_CPU_TYPE=5
        export MKL_ENABLE_INSTRUCTIONS=SSE4_2
        export OPENBLAS_NUM_THREADS=1
        export GOTO_NUM_THREADS=1
        export OMP_NUM_THREADS=1
        export PYTHONHASHSEED=0
        export KMP_DUPLICATE_LIB_OK=TRUE
        export FLAGS_use_mkldnn=0
        export PADDLE_USE_MPS=0
        
        # 动态库路径注入
        PADDLE_LIBS_PATH="$APP_PATH/Contents/MacOS/paddle/libs"
        if [ -d "$PADDLE_LIBS_PATH" ]; then
          export DYLD_LIBRARY_PATH="$PADDLE_LIBS_PATH:$DYLD_LIBRARY_PATH"
          export DYLD_FALLBACK_LIBRARY_PATH="$PADDLE_LIBS_PATH:$DYLD_FALLBACK_LIBRARY_PATH"
          echo "   ✅ Paddle 动态库路径已设置: $PADDLE_LIBS_PATH"
        fi
        
        echo "   🌍 当前环境变量:"
        echo "      DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH"
        echo "      DYLD_FALLBACK_LIBRARY_PATH=$DYLD_FALLBACK_LIBRARY_PATH"
        
        # 启动服务，同时捕获 stdout 和 stderr
        "$EXEC_PATH" > server.log 2>&1 &
        SERVER_PID=$!
        echo "   📌 进程 PID: $SERVER_PID"
        
        # 短暂等待后检查进程是否存在
        sleep 3
        if ! kill -0 $SERVER_PID 2>/dev/null; then
          echo ""
          echo "❌ 进程已立即退出，完整日志如下:"
          cat server.log
          exit 1
        fi
        
        echo ""
        echo "⏳ 等待服务就绪 (最长 360 秒)..."
        SUCCESS=0
        for i in {1..180}; do
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo ""
            echo "❌ 服务进程意外退出 (第 ${i} 次检查)，最后 200 行日志:"
            echo "----------------------------------------------"
            tail -200 server.log
            echo "----------------------------------------------"
            exit 1
          fi
          
          # 每 10 秒打印一次进度
          if [ $((i % 10)) -eq 0 ]; then
            echo "   [${i}] 最新 3 行日志:"
            tail -3 server.log
          fi
          
          # 健康检查
          if curl -s -f http://127.0.0.1:5678/health > /dev/null 2>&1; then
            echo ""
            echo "✅ 服务启动成功！健康检查通过 (耗时约 $((i*2)) 秒)"
            SUCCESS=1
            break
          fi
          sleep 2
        done
        
        if [ $SUCCESS -eq 0 ]; then
          echo ""
          echo "❌ 超时，服务未就绪。完整日志:"
          cat server.log
          kill $SERVER_PID 2>/dev/null || true
          exit 1
        fi
        
        echo ""
        echo "=============================================="
        echo "📄 5. 服务运行日志摘要"
        echo "=============================================="
        echo "   (最后 50 行)"
        tail -50 server.log
        
        # 优雅终止
        kill $SERVER_PID 2>/dev/null || true
        echo ""
        echo "🎉 测试完成"
