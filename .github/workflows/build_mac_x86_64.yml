name: 打包 macOS x86_64 应用 (Intel 原生，兼容 Apple Silicon)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15-intel

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 下载 OCR 模型 (带重试)
      uses: nick-fields/retry@v2
      with:
        timeout_minutes: 10
        max_attempts: 3
        retry_on: error
        command: |
          python -c "
          from paddleocr import PaddleOCR
          import easyocr
          # 使用 3.x 风格初始化，移除已弃用和无效参数
          PaddleOCR(lang='ch', ocr_version='PP-OCRv4', use_textline_orientation=True)
          easyocr.Reader(['ch_sim', 'en'], gpu=False)
          print('✅ 模型下载完成')
          "

    - name: 清理旧构建
      run: rm -rf build dist *.spec.bak *.zip

    - name: PyInstaller 打包
      run: |
        pyinstaller --clean --noconfirm build_mac.spec

    - name: 验证打包产物
      run: |
        if [ ! -d "dist/商委订单审核助手服务端.app" ]; then
          echo "❌ .app 未生成"
          exit 1
        fi
        echo "✅ .app 生成成功"
        ls -la dist/

    - name: 压缩 .app 为 zip
      run: |
        cd dist
        zip -r ../OrderAuditApp-macOS.zip "商委订单审核助手服务端.app"
        cd ..

    - name: 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: macOS-App
        path: OrderAuditApp-macOS.zip

  test:
    name: 🧪 测试 (${{ matrix.os }})
    needs: build
    strategy:
      fail-fast: false   # 关键：一个失败不影响另一个
      matrix:
        os: [macos-15-intel, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
    - name: 下载产物
      uses: actions/download-artifact@v4
      with:
        name: macOS-App

    - name: 解压并测试
      run: |
        set +e   # 允许命令失败而不立即退出脚本
        
        unzip -q OrderAuditApp-macOS.zip
        APP_PATH="./商委订单审核助手服务端.app"
        EXEC_PATH="$APP_PATH/Contents/MacOS/main"
        chmod +x "$EXEC_PATH"
        
        echo "===== 当前测试环境: ${{ matrix.os }} ====="
        echo "===== 架构 ====="
        file "$EXEC_PATH"
        
        echo "===== 环境变量 ====="
        export MKL_DEBUG_CPU_TYPE=5
        export MKL_ENABLE_INSTRUCTIONS=SSE4_2
        export OPENBLAS_NUM_THREADS=1
        export GOTO_NUM_THREADS=1
        export OMP_NUM_THREADS=1
        export PYTHONHASHSEED=0
        export KMP_DUPLICATE_LIB_OK=TRUE
        
        echo "🚀 启动服务..."
        "$EXEC_PATH" > server.log 2>&1 &
        SERVER_PID=$!
        echo "   PID: $SERVER_PID"
        
        # 短暂等待后检查进程是否存在
        sleep 3
        if ! kill -0 $SERVER_PID 2>/dev/null; then
          echo "❌ 进程已退出，查看日志:"
          cat server.log
          exit 1
        fi
        
        echo "⏳ 等待服务就绪 (最多 360 秒)..."
        for i in {1..180}; do
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "❌ 服务进程已退出，最后 100 行日志:"
            tail -100 server.log
            exit 1
          fi
          # 每 20 秒打印一次进度
          if [ $((i % 10)) -eq 0 ]; then
            echo "   [${i}] 最新日志:"
            tail -3 server.log
          fi
          if curl -s -f http://127.0.0.1:5678/health > /dev/null 2>&1; then
            echo "✅ 服务启动成功！健康检查通过 (耗时约 $((i*2)) 秒)"
            kill $SERVER_PID 2>/dev/null || true
            exit 0
          fi
          sleep 2
        done
        
        echo "❌ 超时，服务未就绪。完整日志:"
        cat server.log
        kill $SERVER_PID 2>/dev/null || true
        exit 1
