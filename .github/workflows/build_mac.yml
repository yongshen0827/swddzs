name: 打包 macOS 应用 (Intel 兼容版)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.9 (ARM64 基础环境)
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          architecture: 'arm64' 

      - name: 安装依赖 (强制编译为 x86_64)
        run: |
          arch -x86_64 pip install --upgrade pip
          arch -x86_64 pip install -r requirements.txt

      - name: 执行 PyInstaller 打包
        run: |
          arch -x86_64 pyinstaller build_mac.spec

      - name: 构建 .app 容器
        run: |
          # 创建 .app 结构
          mkdir -p "商委订单审核助手服务端.app/Contents/MacOS"
          mkdir -p "商委订单审核助手服务端.app/Contents/Resources"
          
          # 关键修改：源目录现在是 商委订单审核助手服务端_dist
          SOURCE_DIR="dist/商委订单审核助手服务端_dist"
          
          # 检查源目录是否存在
          if [ ! -d "$SOURCE_DIR" ]; then
            echo "错误：找不到源目录 $SOURCE_DIR"
            ls -la dist/
            exit 1
          fi

          # 复制所有资源文件到 .app 的 Resources
          cp -r "$SOURCE_DIR"/* "商委订单审核助手服务端.app/Contents/Resources/"
          
          # 移动主程序二进制文件到 MacOS
          # 注意：二进制文件依然在 Resources 里被复制了一份，我们需要把它移到 MacOS 并作为入口
          mv "商委订单审核助手服务端.app/Contents/Resources/商委订单审核助手服务端" "商委订单审核助手服务端.app/Contents/MacOS/"
          
          # 生成 Info.plist
          cat > "商委订单审核助手服务端.app/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>商委订单审核助手服务端</string>
            <key>CFBundleIdentifier</key>
            <string>com.example.ocr</string>
            <key>CFBundleName</key>
            <string>商委订单审核助手服务端</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
          </dict>
          </plist>
          EOF

          mkdir -p dist_final
          mv 商委订单审核助手服务端.app dist_final/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Intel-App
          path: dist_final/
