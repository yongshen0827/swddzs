name: 打包 macOS 应用 (Intel 兼容版)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.9 (ARM64 基础环境)
        uses: actions/setup-python@v5
        with:
          # 改回 arm64，使用系统自带或正常下载的 Python，避免 x64 的 dylib 报错
          python-version: '3.9'
          architecture: 'arm64' 

      - name: 安装依赖 (强制编译为 x86_64)
        run: |
          # 关键：使用 arch -x86_64 强制后续命令以 Intel 模式运行
          arch -x86_64 pip install --upgrade pip
          arch -x86_64 pip install -r requirements.txt

      - name: 预下载 OCR 模型 (x86_64 模式)
        run: |
          arch -x86_64 python -c "from paddleocr import PaddleOCR; ocr = PaddleOCR(use_angle_cls=True, lang='ch')" || true
          arch -x86_64 python -c "import easyocr; reader = easyocr.Reader(['ch_sim', 'en'])" || true

      - name: 执行 PyInstaller 打包
        run: |
          # 关键：全程使用 arch -x86_64 包裹命令
          arch -x86_64 pyinstaller build_mac.spec

      - name: 验证架构 (调试用，确保生成的是 Intel 程序)
        run: |
          # 检查生成的可执行文件是否包含 x86_64 架构
          lipo -info dist/商委订单审核助手服务端 || file dist/商委订单审核助手服务端

      - name: 构建 .app 容器
        run: |
          mkdir -p "商委订单审核助手服务端.app/Contents/MacOS"
          mkdir -p "商委订单审核助手服务端.app/Contents/Resources"
          
          # 复制文件 (注意路径，PyInstaller 默认生成在 dist/项目名/项目名)
          # 如果报错 "Not a directory"，请检查 dist 目录下的实际结构
          cp -r dist/商委订单审核助手服务端/* "商委订单审核助手服务端.app/Contents/Resources/" 2>/dev/null || true
          
          # 移动主程序
          mv "dist/商委订单审核助手服务端/商委订单审核助手服务端" "商委订单审核助手服务端.app/Contents/MacOS/"
          
          # 生成 Info.plist
          cat > "商委订单审核助手服务端.app/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>商委订单审核助手服务端</string>
            <key>CFBundleIdentifier</key>
            <string>com.example.ocr</string>
            <key>CFBundleName</key>
            <string>商委订单审核助手服务端</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
          </dict>
          </plist>
          EOF

          mkdir -p dist_final
          mv 商委订单审核助手服务端.app dist_final/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Intel-App
          path: dist_final/
