name: 打包 macOS 应用 (Intel 兼容版 - 修复闪退)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.9 (ARM64 基础环境)
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          architecture: 'arm64' 

      - name: 安装依赖 (强制编译为 x86_64)
        run: |
          arch -x86_64 pip install --upgrade pip
          # 安装所有依赖
          arch -x86_64 pip install -r requirements.txt

      - name: 预下载 OCR 模型 (确保模型文件存在)
        run: |
          # 尝试初始化 PaddleOCR 和 EasyOCR，触发模型下载
          arch -x86_64 python -c "
          try:
            from paddleocr import PaddleOCR; 
            ocr = PaddleOCR(use_angle_cls=True, lang='ch');
          except: pass
          try:
            import easyocr; 
            reader = easyocr.Reader(['ch_sim', 'en']);
          except: pass
          " || echo "模型下载可能失败，但继续打包"

      - name: 执行 PyInstaller 打包
        run: |
          # 使用 arch 强制打包，并指定 spec 文件
          arch -x86_64 pyinstaller build_mac.spec

      - name: 构建标准的 .app 结构 (关键修复步骤)
        run: |
          # 1. 创建标准的 .app 目录结构
          mkdir -p "商委订单审核助手服务端.app/Contents/MacOS"
          mkdir -p "商委订单审核助手服务端.app/Contents/Resources"
          
          # 2. 定义源目录 (根据 spec 中的 COLLECT name)
          SOURCE_DIR="dist/app_contents_temp"
          
          # 3. 将 PyInstaller 打包的所有资源文件复制到 .app/Resources
          # 这一步至关重要，确保 .so 和 .dylib 在程序运行时能被找到
          if [ -d "$SOURCE_DIR" ]; then
            cp -r "$SOURCE_DIR"/* "商委订单审核助手服务端.app/Contents/Resources/"
          else
            echo "错误：找不到源目录 $SOURCE_DIR"
            ls -la dist/
            exit 1
          fi
          
          # 4. 移动主执行文件到 MacOS 目录
          # 注意：主程序在 Resources 里也有一份，我们需要把它移到 MacOS 并重命名为入口
          mv "商委订单审核助手服务端.app/Contents/Resources/商委订单审核助手服务端" "商委订单审核助手服务端.app/Contents/MacOS/"
          
          # 5. 生成 Info.plist (应用程序的身份证)
          cat > "商委订单审核助手服务端.app/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>商委订单审核助手服务端</string>
            <key>CFBundleIdentifier</key>
            <string>com.example.swddzs</string>
            <key>CFBundleName</key>
            <string>商委订单审核助手服务端</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          # 6. 打包成品
          mkdir -p dist_final
          mv 商委订单审核助手服务端.app dist_final/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Intel-App
          path: dist_final/
