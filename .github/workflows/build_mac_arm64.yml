name: 打包 macOS ARM64 应用并测试

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 下载 OCR 模型
      run: |
        python -c "
        from paddleocr import PaddleOCR
        import easyocr
        ocr = PaddleOCR(use_angle_cls=True, lang='ch', show_log=False)
        reader = easyocr.Reader(['ch_sim', 'en'], gpu=False)
        print('模型下载完成')
        "

    - name: 清理旧构建
      run: |
        rm -rf build dist *.spec.bak

    - name: PyInstaller 打包
      run: |
        pyinstaller --clean --noconfirm build_mac_arm64.spec

    - name: 验证打包产物是否存在
      run: |
        if [ ! -d "dist/商委订单审核助手服务端.app" ]; then
          echo "❌ .app 未生成"
          exit 1
        fi
        echo "✅ .app 生成成功"
        ls -la dist/

    - name: 上传打包产物（供测试使用）
      uses: actions/upload-artifact@v4
      with:
        name: macOS-ARM64-App
        path: dist/商委订单审核助手服务端.app
  test:
    name: 🧪 测试应用启动和接口连通性
    runs-on: macos-14
    needs: build

    steps:
    - name: 下载打包好的 .app
      uses: actions/download-artifact@v4
      with:
        name: macOS-ARM64-App
        path: ./downloaded-app

    - name: 探查下载的目录结构（调试用）
      run: |
        echo "===== 下载目录内容 ====="
        ls -la ./downloaded-app
        echo ""
        echo "===== 递归列出所有文件 ====="
        find ./downloaded-app -type f | head -50
        echo ""
        echo "===== 查找 .app 目录 ====="
        find ./downloaded-app -name "*.app" -type d

    - name: 启动服务并实时监控日志
      run: |
        # 先找 .app 目录
        APP_PATH=$(find ./downloaded-app -name "*.app" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "❌ 未找到 .app 包，请检查上方目录结构"
          exit 1
        fi
        echo "✅ 找到 .app: $APP_PATH"
        
        # 查找可执行文件（可能叫 main 或其他名字）
        EXEC_PATH=$(find "$APP_PATH" -name "main" -o -name "商委订单审核助手服务端" | head -n 1)
        if [ -z "$EXEC_PATH" ]; then
          # 如果找不到，列出 Contents/MacOS 内容
          echo "⚠️ 未找到可执行文件，列出 Contents/MacOS 内容:"
          ls -la "$APP_PATH/Contents/MacOS/"
          exit 1
        fi
        echo "✅ 可执行文件: $EXEC_PATH"
        chmod +x "$EXEC_PATH"
        
        echo "🚀 启动服务..."
        "$EXEC_PATH" > server_output.log 2>&1 &
        SERVER_PID=$!
        echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
        
        echo "⏳ 等待服务启动（最多 60 秒）..."
        MAX_WAIT=60
        WAIT_UNTIL=$(($(date +%s) + MAX_WAIT))
        
        while true; do
            if [ $(date +%s) -gt $WAIT_UNTIL ]; then
                echo "❌ 等待超时，服务未启动"
                echo "===== 服务日志 ====="
                cat server_output.log
                exit 1
            fi
            if grep -q "Uvicorn running on http://127.0.0.1:5678" server_output.log; then
                echo "✅ 服务启动成功"
                break
            fi
            sleep 2
        done

    - name: 测试健康检查接口
      run: |
        echo "🔍 测试 http://127.0.0.1:5678/health ..."
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:5678/health || echo "000")
        if [ "$HTTP_CODE" == "200" ]; then
            echo "✅ 健康检查通过 (HTTP $HTTP_CODE)"
        else
            echo "❌ 健康检查失败 (HTTP $HTTP_CODE)"
            echo "===== 服务日志 ====="
            cat server_output.log
            exit 1
        fi

    - name: 清理服务进程
      if: always()
      run: |
        if [ -n "$SERVER_PID" ]; then
          echo "🧹 终止服务进程 $SERVER_PID"
          kill $SERVER_PID 2>/dev/null || true
        fi
