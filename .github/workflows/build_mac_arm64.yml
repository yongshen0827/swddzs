name: 打包 macOS 应用 (Intel 兼容版 - 修复依赖)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

        # ==========================================
    # 终极修复：解决 macOS 14 Python 安装时 dyld 库缺失问题
    # ==========================================
    - name: 安装并配置 gettext 依赖
      run: |
        # 1. 安装库
        brew install gettext
        
        # 2. 关键修复：设置环境变量，告诉编译器和加载器去哪里找库文件
        # 这一步是解决 dyld[xxx]: Library not loaded 错误的核心
        echo 'export LDFLAGS="-L/usr/local/opt/gettext/lib"' >> ~/.zshrc
        echo 'export CPPFLAGS="-I/usr/local/opt/gettext/include"' >> ~/.zshrc
        echo 'export PKG_CONFIG_PATH="/usr/local/opt/gettext/lib/pkgconfig"' >> ~/.zshrc
        
        # 3. 立即生效（针对当前会话）
        export LDFLAGS="-L/usr/local/opt/gettext/lib"
        export CPPFLAGS="-I/usr/local/opt/gettext/include"
        export PKG_CONFIG_PATH="/usr/local/opt/gettext/lib/pkgconfig"
        
        # 4. 强制链接（确保符号链接存在）
        brew link gettext --force

    - name: 安装依赖 (Intel 版)
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka

    - name: 预下载 OCR 模型
      run: |
        python -c "
        try:
            from paddleocr import PaddleOCR
            ocr = PaddleOCR(use_angle_cls=True, lang='ch')
        except Exception as e:
            print(f'PaddleOCR 模型预加载失败: {e}')
        "

    - name: 执行 Nuitka 打包
      run: |
        python -m nuitka \
          --standalone \
          --macos-create-app-bundle \
          --macos-app-name="商委订单审核助手服务端 (Intel版)" \
          --macos-app-icon=none \
          --jobs=2 \
          --output-dir=dist_nuitka \
          --remove-output \
          main.py

    - name: 上传 Nuitka 产物
      uses: actions/upload-artifact@v4
      with:
        name: macOS-Intel-App
        path: dist_nuitka/商委订单审核助手服务端\ \(Intel版\).app

  # ==========================================
  # 优化后的测试环节
  # ==========================================
  test-on-clean-macos:
    name: 🧪 验证 Web 服务启动 (智能轮询)
    runs-on: macos-14
    needs: build
    steps:
    - name: 下载刚才打包好的 .app
      uses: actions/download-artifact@v4
      with:
        name: macOS-Intel-App
        path: ./downloaded-app

    - name: 启动服务并实时监控日志
      run: |
        # 1. 找到 .app 文件
        APP_PATH=$(find ./downloaded-app -name "*.app" | head -n 1)
        echo "📦 找到应用: $APP_PATH"
        
        # 2. 定位可执行文件
        EXEC_PATH="$APP_PATH/Contents/MacOS/main"
        chmod +x "$EXEC_PATH"

        # 3. 后台启动服务，重定向输出到日志文件
        # 注意：Nuitka 打包的程序启动通常比原生 Python 慢，因为要解压环境
        "$EXEC_PATH" > server_output.log 2>&1 &
        echo "🚀 服务进程已启动，PID: $!"

        # 4. 智能轮询检查 (最多等待 180 秒)
        echo "⏳ 开始监控日志，等待服务就绪..."
        MAX_WAIT=180
        WAIT_UNTIL=$(($(date +%s) + MAX_WAIT))
        
        while true; do
            # 检查是否超时
            if [ $(date +%s) -gt $WAIT_UNTIL ]; then
                echo "❌ 等待超时 (${MAX_WAIT}秒)，服务未启动。最后日志如下："
                tail -n 20 server_output.log
                exit 1
            fi

            # 检查日志中是否包含成功标志
            # 精准匹配你提供的日志格式
            if grep -q "Uvicorn running on http://127.0.0.1:5678" server_output.log; then
                echo "✅ 服务启动成功！检测到目标日志。"
                break
            fi
            
            # 如果日志还没刷出来，检查是否有致命错误 (如库丢失)
            if grep -q "Library not loaded" server_output.log; then
                echo "❌ 检测到动态库丢失错误，停止等待。"
                cat server_output.log
                exit 1
            fi
            if grep -q "ModuleNotFoundError" server_output.log; then
                echo "❌ 检测到模块丢失错误，停止等待。"
                cat server_output.log
                exit 1
            fi

            # 等待 2 秒后再次检查
            sleep 2
            echo -n "."
        done

    - name: 最终连通性测试 (兜底)
      run: |
        # 即使日志显示成功，我们也尝试访问一下端口，确保万无一失
        echo "🔍 正在测试端口 5678 连通性..."
        
        # 尝试访问根路径，超时设置为 5 秒
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:5678/ || echo "000")
        
        if [ "$HTTP_CODE" == "200" ] || [ "$HTTP_CODE" == "404" ]; then
            echo "✅ 接口响应正常 (HTTP $HTTP_CODE)。打包验证通过！"
        else
            echo "⚠️ 接口响应异常 (HTTP $HTTP_CODE)。虽然日志显示启动，但网络请求失败。"
            echo "查看完整日志："
            cat server_output.log
            exit 1
        fi
