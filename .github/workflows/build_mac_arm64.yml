name: 打包 macOS 应用 (Intel 兼容版 - 使用 macOS 14 加速)

on:
  workflow_dispatch:

jobs:
  build:
    # 使用 macOS 14 (不排队)，但我们将强制使用 Intel 架构运行
    runs-on: macos-14
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    # ==========================================
    # 核心魔法：安装 Intel 版 Python (通过 Rosetta)
    # ==========================================
    - name: 设置 Python 3.9 (强制 x64/Intel 架构)
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        # 强制指定架构为 x64，GitHub 会自动配置 Rosetta 环境
        architecture: 'x64'

    - name: 验证架构 (确保是 Intel)
      run: |
        echo "当前 Python 架构:"
        python -c "import platform; print(platform.machine())"
        # 应该输出 x86_64
        if [ "$(python -c 'import platform; print(platform.machine())')" != "x86_64" ]; then
          echo "❌ 错误：Python 不是 Intel 架构!"
          exit 1
        fi
        echo "✅ 成功：Python 运行在 Intel 架构下"

    - name: 安装依赖 (Intel 版)
      run: |
        # 因为 Python 是 Intel 版，pip 会自动下载 Intel 版的 Paddle
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka

    - name: 预下载 OCR 模型
      run: |
        # 在 Intel 环境下预加载模型
        python -c "
        try:
            from paddleocr import PaddleOCR
            ocr = PaddleOCR(use_angle_cls=True, lang='ch')
        except Exception as e:
            print(f'PaddleOCR 模型预加载失败: {e}')
        
        try:
            import easyocr
            reader = easyocr.Reader(['ch_sim', 'en'])
        except Exception as e:
            print(f'EasyOCR 模型预加载失败: {e}')
        "

    - name: 执行 Nuitka 打包
      run: |
        # 这里的打包是在 Intel 环境下进行的，生成的也是 Intel 二进制文件
        python -m nuitka \
          --standalone \
          --macos-create-app-bundle \
          --macos-app-name="商委订单审核助手服务端 (Intel版)" \
          --macos-app-icon=none \
          --jobs=2 \
          --output-dir=dist_nuitka \
          --remove-output \
          main.py

    - name: 上传 Nuitka 产物
      uses: actions/upload-artifact@v4
      with:
        name: macOS-Intel-App
        path: dist_nuitka/商委订单审核助手服务端\ \(Intel版\).app

  test-on-clean-macos:
    name: 🧪 验证 Web 服务启动
    runs-on: macos-14
    needs: build
    steps:
    - name: 下载刚才打包好的 .app
      uses: actions/download-artifact@v4
      with:
        name: macOS-Intel-App
        path: ./downloaded-app

    - name: 赋予执行权限并启动服务
      run: |
        APP_PATH=$(find ./downloaded-app -name "*.app" | head -n 1)
        echo "Found App: $APP_PATH"
        
        # Nuitka 生成的可执行文件路径
        EXEC_PATH="$APP_PATH/Contents/MacOS/main"
        
        chmod +x "$EXEC_PATH"
        
        # 后台启动
        "$EXEC_PATH" > server_output.log 2>&1 &
        echo "服务已启动，PID: $!"

    - name: 等待服务预热
      run: sleep 10

    - name: 检查日志
      run: |
        if grep -q "Uvicorn running" server_output.log; then
            echo "✅ 服务启动成功"
        elif grep -q "Application startup complete" server_output.log; then
            echo "✅ 服务启动成功"
        else
            echo "❌ 服务启动失败，查看日志："
            cat server_output.log
            exit 1
        fi

        if grep -q "Library not loaded" server_output.log; then
            echo "❌ 检测到动态库丢失"
            exit 1
        fi
