name: 打包 macOS ARM64 应用并测试

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 虚拟环境 (强制 ARM64)
      run: |
        arch -arm64 python3 -m venv venv
        source venv/bin/activate
        echo "VIRTUAL_ENV=$PWD/venv" >> $GITHUB_ENV
        echo "$PWD/venv/bin" >> $GITHUB_PATH

    - name: 升级 pip 和基础工具
      run: |
        source venv/bin/activate
        arch -arm64 pip install --upgrade pip setuptools wheel

    - name: 安装项目依赖 (锁定稳定版本)
      run: |
        source venv/bin/activate
        arch -arm64 pip install numpy==1.26.4
        arch -arm64 pip install scipy==1.7.3        # 1.7.3 是第一个提供 ARM64 wheel 的版本
        arch -arm64 pip install -r requirements.txt

    - name: 验证关键库的架构 (确保无 x86_64 混入)
      run: |
        source venv/bin/activate
        echo "===== Python 架构 ====="
        arch -arm64 python -c "import platform; print(platform.machine()); assert platform.machine() == 'arm64'"
        echo "===== 检查动态库架构 (前 20 个) ====="
        find venv/lib -name "*.dylib" -o -name "*.so" | head -20 | while read lib; do
          file "$lib" | grep -v "arm64" && echo "⚠️ 非 ARM64 库: $lib"
        done

    - name: 下载 OCR 模型
      run: |
        source venv/bin/activate
        arch -arm64 python -c "
        from paddleocr import PaddleOCR
        import easyocr
        ocr = PaddleOCR(use_angle_cls=True, lang='ch', show_log=False)
        reader = easyocr.Reader(['ch_sim', 'en'], gpu=False)
        print('✅ 模型下载完成')
        "

    - name: 清理旧构建
      run: |
        rm -rf build dist *.spec.bak *.zip

    - name: PyInstaller 打包
      run: |
        source venv/bin/activate
        arch -arm64 pyinstaller --clean --noconfirm build_mac_arm64.spec

    - name: 验证打包产物
      run: |
        if [ ! -d "dist/商委订单审核助手服务端.app" ]; then
          echo "❌ .app 未生成"
          exit 1
        fi
        echo "✅ .app 生成成功"
        ls -la dist/

    - name: 压缩 .app 为 zip
      run: |
        cd dist
        zip -r ../OrderAuditApp.zip "商委订单审核助手服务端.app"
        cd ..

    - name: 上传 zip 包
      uses: actions/upload-artifact@v4
      with:
        name: macOS-ARM64-App
        path: OrderAuditApp.zip

  test:
    name: 🧪 测试应用启动和接口连通性
    runs-on: macos-14
    needs: build

    steps:
    - name: 下载 zip 包
      uses: actions/download-artifact@v4
      with:
        name: macOS-ARM64-App
        path: ./

    - name: 解压 .app
      run: |
        unzip -q OrderAuditApp.zip
        ls -la

    - name: 启动服务
      run: |
        APP_PATH="./商委订单审核助手服务端.app"
        EXEC_PATH="$APP_PATH/Contents/MacOS/main"
        if [ ! -f "$EXEC_PATH" ]; then
          echo "❌ 可执行文件不存在: $EXEC_PATH"
          exit 1
        fi
        chmod +x "$EXEC_PATH"
        
        echo "🚀 启动服务..."
        "$EXEC_PATH" > server_output.log 2>&1 &
        SERVER_PID=$!
        echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
        
        echo "⏳ 等待服务启动 (最多 120 秒，首次加载模型较慢)..."
        MAX_WAIT=120
        WAIT_UNTIL=$(($(date +%s) + MAX_WAIT))
        
        while true; do
            if [ $(date +%s) -gt $WAIT_UNTIL ]; then
                echo "❌ 等待超时，服务未启动"
                echo "===== 服务日志 ====="
                cat server_output.log
                exit 1
            fi
            if grep -q "Uvicorn running on http://127.0.0.1:5678" server_output.log; then
                echo "✅ 服务启动成功"
                break
            fi
            sleep 2
        done

    - name: 测试健康检查接口
      run: |
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:5678/health || echo "000")
        if [ "$HTTP_CODE" == "200" ]; then
            echo "✅ 健康检查通过 (HTTP $HTTP_CODE)"
        else
            echo "❌ 健康检查失败 (HTTP $HTTP_CODE)"
            cat server_output.log
            exit 1
        fi

    - name: 清理服务进程
      if: always()
      run: |
        if [ -n "$SERVER_PID" ]; then
          echo "🧹 终止服务进程 $SERVER_PID"
          kill $SERVER_PID 2>/dev/null || true
        fi
