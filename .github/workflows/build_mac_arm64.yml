name: 打包 macOS 应用 (Miniconda x86_64 跨架构构建)

on:
  workflow_dispatch:

env:
  CONDA_ENV_NAME: "x86_env"
  PYTHON_VERSION: "3.9"

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    # ==========================================
    # 1. 安装 Miniconda (x86_64 版本)
    # ==========================================
    - name: 安装 Miniconda (x86_64)
      run: |
        echo "📥 下载 x86_64 版 Miniconda..."
        # 下载官方提供的 x86_64 安装包
        curl -o miniconda.sh https://repo.anaconda.com/miniconda/Miniconda3-latest-MacOSX-x86_64.sh
        # 安装到 ~/miniconda，不需要 sudo
        bash miniconda.sh -b -p $HOME/miniconda
        
        # 初始化 Shell
        source $HOME/miniconda/etc/profile.d/conda.sh
        
        # 创建纯 x86_64 的 Python 环境
        # 关键点：archspec 强制该环境只解析 x86_64 包
        conda create -n ${{ env.CONDA_ENV_NAME }} python=${{ env.PYTHON_VERSION }} archspec=generic -y
        
        echo "✅ x86_64 Conda 环境创建完成"

    # ==========================================
    # 2. 安装项目依赖
    # ==========================================
    - name: 安装项目依赖
      run: |
        # 激活环境
        source $HOME/miniconda/etc/profile.d/conda.sh
        conda activate ${{ env.CONDA_ENV_NAME }}
        
        # 此时 python 是 x86_64 版本，pip 下载的也是 x86_64 的 wheel
        python --version
        pip install --upgrade pip
        
        # 安装依赖 (自动获取 Intel 版本)
        pip install "numpy<1.22"
        pip install torch torchvision torchaudio
        pip install paddlepaddle
        pip install nuitka
        
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    # ==========================================
    # 3. 执行 Nuitka 打包
    # ==========================================
    - name: 执行 Nuitka 打包
      run: |
        source $HOME/miniconda/etc/profile.d/conda.sh
        conda activate ${{ env.CONDA_ENV_NAME }}
        
        # 在 x86_64 环境下运行 Nuitka
        # 这样 otool 检查的也是 x86_64 库，不会报错
        python -m nuitka \
          --standalone \
          --macos-create-app-bundle \
          --macos-app-name="商委订单审核助手服务端 (Intel版)" \
          --macos-app-icon=none \
          --jobs=2 \
          --output-dir=dist_nuitka \
          --remove-output \
          --nofollow-import-to=torch \
          --nofollow-import-to=numpy \
          --nofollow-import-to=PIL \
          --nofollow-import-to=paddle \
          main.py

    # ==========================================
    # 4. 手动注入依赖
    # ==========================================
    - name: 手动复制依赖到包内
      run: |
        source $HOME/miniconda/etc/profile.d/conda.sh
        conda activate ${{ env.CONDA_ENV_NAME }}
        
        echo "🔧 正在手动注入依赖库..."
        
        APP_PATH=$(find dist_nuitka -name "*.app" | head -n 1)
        LIB_PATH="$APP_PATH/Contents/MacOS"
        
        # 获取 Conda 环境的 site-packages
        SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
        
        # 复制核心库
        for pkg in torch numpy paddle torchvision; do
          if [ -d "$SITE_PACKAGES/$pkg" ]; then
            echo "📦 复制 $pkg..."
            cp -r "$SITE_PACKAGES/$pkg" "$LIB_PATH/"
          fi
        done
        
        if [ -d "$SITE_PACKAGES/PIL" ]; then
            cp -r "$SITE_PACKAGES/PIL" "$LIB_PATH/"
        fi

        echo "✅ 库注入完成"

    - name: 上传 Nuitka 产物
      uses: actions/upload-artifact@v4
      with:
        name: macOS-Intel-App
        path: dist_nuitka/商委订单审核助手服务端\ $Intel版$.app

  # ==========================================
  # 测试环节
  # ==========================================
  test-on-clean-macos:
    name: 🧪 验证 Web 服务启动
    runs-on: macos-14
    needs: build
    steps:
    - name: 下载刚才打包好的 .app
      uses: actions/download-artifact@v4
      with:
        name: macOS-Intel-App
        path: ./downloaded-app

    - name: 启动服务并实时监控日志
      run: |
        APP_PATH=$(find ./downloaded-app -name "*.app" | head -n 1)
        EXEC_PATH="$APP_PATH/Contents/MacOS/main"
        chmod +x "$EXEC_PATH"
        
        # 在 M1 上运行 Intel 程序，使用 Rosetta 转译
        arch -x86_64 "$EXEC_PATH" > server_output.log 2>&1 &
        
        echo "⏳ 等待服务启动..."
        MAX_WAIT=60
        WAIT_UNTIL=$(($(date +%s) + MAX_WAIT))
        
        while true; do
            if [ $(date +%s) -gt $WAIT_UNTIL ]; then
                echo "❌ 等待超时，服务未启动"
                cat server_output.log
                exit 1
            fi
            if grep -q "Uvicorn running on http://127.0.0.1:5678" server_output.log; then
                echo "✅ 服务启动成功"
                break
            fi
            sleep 2
        done

    - name: 最终连通性测试
      run: |
        echo "🔍 测试接口连通性..."
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:5678/ || echo "000")
        if [ "$HTTP_CODE" == "200" ] || [ "$HTTP_CODE" == "404" ]; then
            echo "✅ 接口响应正常 (HTTP $HTTP_CODE)"
        else
            echo "❌ 接口异常 (HTTP $HTTP_CODE)"
            cat server_output.log
            exit 1
        fi
