name: 打包 macOS 应用 (Intel 兼容版 - 排除 Torch 优化)

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.9.25"
  GETTEXT_PATH: "/usr/local/opt/gettext"

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    # ==========================================
    # 1. 安装依赖库 (gettext)
    # ==========================================
    - name: 安装 Homebrew 依赖
      run: |
        brew install gettext
        brew link gettext --force
        echo "✅ Gettext 已安装并链接"

    # ==========================================
    # 2. 手动编译安装 Python (解决环境问题)
    # ==========================================
    - name: 编译并安装 Python (源码构建)
      run: |
        echo "📥 下载 Python ${{ env.PYTHON_VERSION }} 源码..."
        curl -O https://www.python.org/ftp/python/${{ env.PYTHON_VERSION }}/Python-${{ env.PYTHON_VERSION }}.tgz
        tar -xzf Python-${{ env.PYTHON_VERSION }}.tgz
        cd Python-${{ env.PYTHON_VERSION }}

        echo "⚙️ 配置编译环境..."
        export LDFLAGS="-L${{ env.GETTEXT_PATH }}/lib"
        export CPPFLAGS="-I${{ env.GETTEXT_PATH }}/include"
        
        ./configure --prefix=/usr/local --enable-optimizations --with-ensurepip=install
        
        echo "🔨 开始编译 (这可能需要几分钟)..."
        make -j 4
        sudo make altinstall
        
        echo "✅ 验证 Python 版本..."
        /usr/local/bin/python3.9 --version
        
        # 创建软链接
        sudo ln -sf /usr/local/bin/python3.9 /usr/local/bin/python
        sudo ln -sf /usr/local/bin/pip3.9 /usr/local/bin/pip

    # ==========================================
    # 3. 配置环境变量
    # ==========================================
    - name: 设置 Python 环境变量
      run: |
        echo "/usr/local/bin" >> $GITHUB_PATH

    # ==========================================
    # 4. 安装项目依赖
    # ==========================================
    - name: 安装依赖 (预装兼容版 Numpy 和 Torch)
      run: |
        pip install --upgrade pip
        
        # 强制安装兼容版 Numpy
        pip install "numpy<1.22"
        
        # 安装 PyTorch (CPU 版本即可，或者你需要 MPS 版本请自行调整)
        # 这里使用官方推荐的稳定版链接
        pip install torch torchvision torchaudio
        
        # 安装其他依赖
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi
        
        pip install nuitka

    # ==========================================
    # 5. 执行 Nuitka 打包 (关键修改：排除 Torch)
    # ==========================================
    - name: 执行 Nuitka 打包
      run: |
        # 使用 --nofollow-import-to 告诉 Nuitka 不要碰 torch 和 numpy
        # 这样可以避免编译数小时甚至卡死
        python -m nuitka \
          --standalone \
          --macos-create-app-bundle \
          --macos-app-name="商委订单审核助手服务端 (Intel版)" \
          --macos-app-icon=none \
          --jobs=2 \
          --output-dir=dist_nuitka \
          --remove-output \
          --nofollow-import-to=torch \
          --nofollow-import-to=numpy \
          --nofollow-import-to=PIL \
          main.py

    # ==========================================
    # 6. 手动注入 Torch 和 Numpy (关键修复)
    # ==========================================
    - name: 手动复制 Torch 和 Numpy 到包内
      run: |
        echo "🔧 正在手动注入 Torch 和 Numpy..."
        
        # 定位打包生成的 .app 目录
        APP_PATH=$(find dist_nuitka -name "*.app" | head -n 1)
        LIB_PATH="$APP_PATH/Contents/MacOS" # Nuitka standalone 模式下，库通常放在这里或同级
        
        # 找到 Python 环境的 site-packages
        SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
        
        # 复制 torch
        echo "📦 复制 torch..."
        cp -r "$SITE_PACKAGES/torch" "$LIB_PATH/"
        
        # 复制 numpy
        echo "📦 复制 numpy..."
        cp -r "$SITE_PACKAGES/numpy" "$LIB_PATH/"
        
        # 复制 PIL (Pillow) - 如果用了图像处理
        if [ -d "$SITE_PACKAGES/PIL" ]; then
            cp -r "$SITE_PACKAGES/PIL" "$LIB_PATH/"
        fi
        
        # 复制 torchvision (如果用了)
        if [ -d "$SITE_PACKAGES/torchvision" ]; then
            cp -r "$SITE_PACKAGES/torchvision" "$LIB_PATH/"
        fi

        echo "✅ 库注入完成"

    - name: 上传 Nuitka 产物
      uses: actions/upload-artifact@v4
      with:
        name: macOS-Intel-App
        path: dist_nuitka/商委订单审核助手服务端\ \(Intel版\).app

  # ==========================================
  # 测试环节
  # ==========================================
  test-on-clean-macos:
    name: 🧪 验证 Web 服务启动
    runs-on: macos-14
    needs: build
    steps:
    - name: 下载刚才打包好的 .app
      uses: actions/download-artifact@v4
      with:
        name: macOS-Intel-App
        path: ./downloaded-app

    - name: 启动服务并实时监控日志
      run: |
        APP_PATH=$(find ./downloaded-app -name "*.app" | head -n 1)
        EXEC_PATH="$APP_PATH/Contents/MacOS/main"
        chmod +x "$EXEC_PATH"
        "$EXEC_PATH" > server_output.log 2>&1 &
        
        MAX_WAIT=60
        WAIT_UNTIL=$(($(date +%s) + MAX_WAIT))
        
        while true; do
            if [ $(date +%s) -gt $WAIT_UNTIL ]; then
                echo "❌ 等待超时"
                cat server_output.log
                exit 1
            fi
            if grep -q "Uvicorn running on http://127.0.0.1:5678" server_output.log; then
                echo "✅ 启动成功"
                break
            fi
            sleep 2
        done

    - name: 最终连通性测试
      run: |
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:5678/ || echo "000")
        if [ "$HTTP_CODE" == "200" ] || [ "$HTTP_CODE" == "404" ]; then
            echo "✅ 接口响应正常 (HTTP $HTTP_CODE)"
        else
            echo "❌ 接口异常 (HTTP $HTTP_CODE)"
            cat server_output.log
            exit 1
        fi
