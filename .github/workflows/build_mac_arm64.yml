name: 打包 macOS ARM64 应用并测试

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 下载 OCR 模型
      run: |
        python -c "
        from paddleocr import PaddleOCR
        import easyocr
        ocr = PaddleOCR(use_angle_cls=True, lang='ch', show_log=False)
        reader = easyocr.Reader(['ch_sim', 'en'], gpu=False)
        print('模型下载完成')
        "

    - name: 清理旧构建
      run: |
        rm -rf build dist *.spec.bak

    - name: PyInstaller 打包
      run: |
        pyinstaller --clean --noconfirm build_mac_arm64.spec

    - name: 验证打包产物结构
      run: |
        echo "===== dist 目录内容 ====="
        ls -la dist/
        echo ""
        APP_PATH="dist/商委订单审核助手服务端.app"
        if [ -d "$APP_PATH" ]; then
          echo "✅ .app 目录存在"
          echo "===== .app 内部结构 ====="
          ls -la "$APP_PATH/"
          echo "===== Contents/MacOS 内容 ====="
          ls -la "$APP_PATH/Contents/MacOS/"
        else
          echo "❌ .app 目录不存在"
          exit 1
        fi

    - name: 上传打包产物（保留 .app 目录）
      uses: actions/upload-artifact@v4
      with:
        name: macOS-ARM64-App
        path: dist/商委订单审核助手服务端.app
        # 确保保留父目录，不加尾部斜杠

  test:
    name: 🧪 测试应用启动和接口连通性
    runs-on: macos-14
    needs: build

    steps:
    - name: 下载打包好的 .app
      uses: actions/download-artifact@v4
      with:
        name: macOS-ARM64-App
        path: ./downloaded-app

    - name: 探查下载目录结构（调试）
      run: |
        echo "===== downloaded-app 目录 ====="
        ls -la ./downloaded-app
        echo ""
        echo "===== 查找 .app 目录 ====="
        find ./downloaded-app -name "*.app" -type d

    - name: 启动服务并实时监控日志
      run: |
        # 直接使用固定路径，因为 artifact 解压后应保留 "商委订单审核助手服务端.app" 目录
        APP_PATH="./downloaded-app/商委订单审核助手服务端.app"
        if [ ! -d "$APP_PATH" ]; then
          echo "❌ 未找到 .app 包，请检查上方目录结构"
          exit 1
        fi
        echo "✅ 找到 .app: $APP_PATH"
        
        EXEC_PATH="$APP_PATH/Contents/MacOS/main"
        if [ ! -f "$EXEC_PATH" ]; then
          echo "⚠️ 可执行文件 main 不存在，尝试列出 Contents/MacOS:"
          ls -la "$APP_PATH/Contents/MacOS/"
          exit 1
        fi
        chmod +x "$EXEC_PATH"
        
        echo "🚀 启动服务..."
        "$EXEC_PATH" > server_output.log 2>&1 &
        SERVER_PID=$!
        echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
        
        echo "⏳ 等待服务启动（最多 60 秒）..."
        MAX_WAIT=60
        WAIT_UNTIL=$(($(date +%s) + MAX_WAIT))
        
        while true; do
            if [ $(date +%s) -gt $WAIT_UNTIL ]; then
                echo "❌ 等待超时，服务未启动"
                echo "===== 服务日志 ====="
                cat server_output.log
                exit 1
            fi
            if grep -q "Uvicorn running on http://127.0.0.1:5678" server_output.log; then
                echo "✅ 服务启动成功"
                break
            fi
            sleep 2
        done

    - name: 测试健康检查接口
      run: |
        echo "🔍 测试 http://127.0.0.1:5678/health ..."
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:5678/health || echo "000")
        if [ "$HTTP_CODE" == "200" ]; then
            echo "✅ 健康检查通过 (HTTP $HTTP_CODE)"
        else
            echo "❌ 健康检查失败 (HTTP $HTTP_CODE)"
            echo "===== 服务日志 ====="
            cat server_output.log
            exit 1
        fi

    - name: 清理服务进程
      if: always()
      run: |
        if [ -n "$SERVER_PID" ]; then
          echo "🧹 终止服务进程 $SERVER_PID"
          kill $SERVER_PID 2>/dev/null || true
        fi
