name: 打包 macOS 应用 (Intel 兼容版 - 依赖前置修复)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    # ==========================================
    # 1. 【关键前置步骤】修复系统依赖
    # 必须在 setup-python 之前安装！否则 Python 安装会因找不到库而崩溃
    # ==========================================
    - name: 安装并配置 gettext 依赖 (前置)
      run: |
        echo "🔧 正在安装 gettext..."
        brew install gettext
        
        # 设置环境变量，确保编译和运行时能找到库
        echo 'export LDFLAGS="-L/usr/local/opt/gettext/lib"' >> ~/.zshrc
        echo 'export CPPFLAGS="-I/usr/local/opt/gettext/include"' >> ~/.zshrc
        # 立即生效，供后续步骤使用
        export LDFLAGS="-L/usr/local/opt/gettext/lib"
        export CPPFLAGS="-I/usr/local/opt/gettext/include"
        
        # 强制链接，确保系统能找到
        brew link gettext --force
        echo "✅ Gettext 安装并链接完成"

    # ==========================================
    # 2. 设置 Intel 架构 Python
    # 现在 Python 可以安全地运行 ensurepip 了
    # ==========================================
    - name: 设置 Python 3.9 (强制 x64/Intel 架构)
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        architecture: 'x64'  # 关键：强制使用 Intel 架构

    # ==========================================
    # 3. 修复 Numpy 冲突并安装依赖
    # ==========================================
    - name: 安装依赖 (预装兼容版 Numpy)
      run: |
        pip cache purge
        pip install --upgrade pip
        
        # 【核心修复】先强制安装 numpy 1.21.6
        echo "📦 正在安装兼容性 Numpy..."
        pip install "numpy<1.22"
        
        # 再安装 requirements.txt
        echo "📦 正在安装项目依赖..."
        pip install -r requirements.txt
        
        # 安装打包工具
        pip install nuitka

    - name: 验证架构
      run: |
        echo "当前 Python 架构:"
        python -c "import platform; print(platform.machine())"
        if [ "$(python -c 'import platform; print(platform.machine())')" != "x86_64" ]; then
          echo "❌ 错误：Python 不是 Intel 架构!"
          exit 1
        fi
        echo "✅ 成功：Python 运行在 Intel 架构下"

    - name: 执行 Nuitka 打包
      run: |
        python -m nuitka \
          --standalone \
          --macos-create-app-bundle \
          --macos-app-name="商委订单审核助手服务端 (Intel版)" \
          --macos-app-icon=none \
          --jobs=2 \
          --output-dir=dist_nuitka \
          --remove-output \
          main.py

    - name: 上传 Nuitka 产物
      uses: actions/upload-artifact@v4
      with:
        name: macOS-Intel-App
        path: dist_nuitka/商委订单审核助手服务端\ $Intel版$.app

  # ==========================================
  # 测试环节 (保持不变)
  # ==========================================
  test-on-clean-macos:
    name: 🧪 验证 Web 服务启动
    runs-on: macos-14
    needs: build
    steps:
    - name: 下载刚才打包好的 .app
      uses: actions/download-artifact@v4
      with:
        name: macOS-Intel-App
        path: ./downloaded-app

    - name: 启动服务并实时监控日志
      run: |
        APP_PATH=$(find ./downloaded-app -name "*.app" | head -n 1)
        echo "📦 找到应用: $APP_PATH"
        
        EXEC_PATH="$APP_PATH/Contents/MacOS/main"
        chmod +x "$EXEC_PATH"

        "$EXEC_PATH" > server_output.log 2>&1 &
        echo "🚀 服务进程已启动，PID: $!"

        MAX_WAIT=60
        WAIT_UNTIL=$(($(date +%s) + MAX_WAIT))
        
        while true; do
            if [ $(date +%s) -gt $WAIT_UNTIL ]; then
                echo "❌ 等待超时 (${MAX_WAIT}秒)，服务未启动。最后日志如下："
                tail -n 20 server_output.log
                exit 1
            fi

            if grep -q "Uvicorn running on http://127.0.0.1:5678" server_output.log; then
                echo "✅ 服务启动成功！检测到目标日志。"
                break
            fi
            
            if grep -q "Library not loaded" server_output.log; then
                echo "❌ 检测到动态库丢失错误。"
                cat server_output.log
                exit 1
            fi
            if grep -q "ModuleNotFoundError" server_output.log; then
                echo "❌ 检测到模块丢失错误。"
                cat server_output.log
                exit 1
            fi

            sleep 2
            echo -n "."
        done

    - name: 最终连通性测试
      run: |
        echo "🔍 正在测试端口 5678 连通性..."
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:5678/ || echo "000")
        
        if [ "$HTTP_CODE" == "200" ] || [ "$HTTP_CODE" == "404" ]; then
            echo "✅ 接口响应正常 (HTTP $HTTP_CODE)。打包验证通过！"
        else
            echo "⚠️ 接口响应异常 (HTTP $HTTP_CODE)。"
            cat server_output.log
            exit 1
        fi
