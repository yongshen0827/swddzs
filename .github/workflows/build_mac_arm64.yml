name: 打包 macOS 应用 (Intel 兼容版 - 环境变量全局生效)

on:
  workflow_dispatch:

env:
  # ==========================================
  # 【核心修复】全局环境变量
  # 强制所有后续步骤都继承这些变量，解决 Python 编译时找不到库的问题
  # ==========================================
  LDFLAGS: "-L/usr/local/opt/gettext/lib"
  CPPFLAGS: "-I/usr/local/opt/gettext/include"
  PKG_CONFIG_PATH: "/usr/local/opt/gettext/lib/pkgconfig"

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    # ==========================================
    # 1. 修复系统依赖 (前置且强制)
    # ==========================================
    - name: 安装并配置 gettext 依赖
      run: |
        # 1. 安装 gettext
        brew install gettext
        
        # 2. 验证安装结果 (调试用，确保文件存在)
        echo "🔍 检查库文件是否存在..."
        ls -la /usr/local/opt/gettext/lib/libintl.8.dylib || echo "❌ 库文件未找到!"
        
        # 3. 强制链接 (关键：覆盖系统保护，强制建立链接)
        brew link gettext --force
        
        # 4. 输出当前环境变量供调试
        echo "LIBINTL=$(brew --prefix gettext)/lib" >> $GITHUB_ENV

    # ==========================================
    # 2. 设置 Python (现在环境变量已就绪)
    # ==========================================
    - name: 设置 Python 3.9 (强制 x64/Intel 架构)
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        architecture: 'x64'

    # ==========================================
    # 3. 安装依赖与打包
    # ==========================================
    - name: 安装依赖 (预装兼容版 Numpy)
      run: |
        pip cache purge
        pip install --upgrade pip
        
        # 强制安装兼容版 Numpy
        pip install "numpy<1.22"
        
        # 安装项目依赖
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          echo "⚠️ requirements.txt 未找到，跳过依赖安装"
        fi
        
        # 安装打包工具
        pip install nuitka

    - name: 验证架构
      run: |
        python -c "import platform; print(f'架构: {platform.machine()}')"
        python -c "import numpy; print(f'Numpy 版本: {numpy.__version__}')"

    - name: 执行 Nuitka 打包
      run: |
        python -m nuitka \
          --standalone \
          --macos-create-app-bundle \
          --macos-app-name="商委订单审核助手服务端 (Intel版)" \
          --macos-app-icon=none \
          --jobs=2 \
          --output-dir=dist_nuitka \
          --remove-output \
          main.py

    - name: 上传 Nuitka 产物
      uses: actions/upload-artifact@v4
      with:
        name: macOS-Intel-App
        path: dist_nuitka/商委订单审核助手服务端\ $Intel版$.app

  # ==========================================
  # 测试环节 (保持不变)
  # ==========================================
  test-on-clean-macos:
    name: 🧪 验证 Web 服务启动
    runs-on: macos-14
    needs: build
    steps:
    - name: 下载刚才打包好的 .app
      uses: actions/download-artifact@v4
      with:
        name: macOS-Intel-App
        path: ./downloaded-app

    - name: 启动服务并实时监控日志
      run: |
        APP_PATH=$(find ./downloaded-app -name "*.app" | head -n 1)
        EXEC_PATH="$APP_PATH/Contents/MacOS/main"
        chmod +x "$EXEC_PATH"
        "$EXEC_PATH" > server_output.log 2>&1 &
        
        MAX_WAIT=60
        WAIT_UNTIL=$(($(date +%s) + MAX_WAIT))
        
        while true; do
            if [ $(date +%s) -gt $WAIT_UNTIL ]; then
                echo "❌ 等待超时"
                cat server_output.log
                exit 1
            fi
            if grep -q "Uvicorn running on http://127.0.0.1:5678" server_output.log; then
                echo "✅ 启动成功"
                break
            fi
            sleep 2
        done

    - name: 最终连通性测试
      run: |
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:5678/ || echo "000")
        if [ "$HTTP_CODE" == "200" ] || [ "$HTTP_CODE" == "404" ]; then
            echo "✅ 接口响应正常 (HTTP $HTTP_CODE)"
        else
            echo "❌ 接口异常 (HTTP $HTTP_CODE)"
            exit 1
        fi
