name: 打包 macOS 应用 (M1/M2/M3/M4 原生版)
on: 
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.9 (ARM64 原生环境)
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          architecture: 'arm64'

      - name: 安装依赖 (原生 ARM64)
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ===== 关键修复：注释 Paddle 的路径设置函数 =====
      - name: 修复 Paddle 源码 (防止 PyInstaller 环境崩溃)
        run: |
          python -c "
          import paddle, os, inspect
          core_file = os.path.join(os.path.dirname(inspect.getfile(paddle.base.core)), 'core.py')
          with open(core_file, 'r') as f:
              content = f.read()
          # 将函数调用注释掉
          content = content.replace('set_paddle_lib_path()', '# set_paddle_lib_path()  # patched for PyInstaller')
          with open(core_file, 'w') as f:
              f.write(content)
          print('✅ 已注释 paddle.base.core.set_paddle_lib_path() 调用')
          "

      - name: 预下载 OCR 模型 (保留，便于打包进 .app)
        run: |
          python -c " 
          try:
              from paddleocr import PaddleOCR; ocr = PaddleOCR(use_angle_cls=True, lang='ch'); 
          except Exception as e:
              print(e)
          try:
              import easyocr; reader = easyocr.Reader(['ch_sim', 'en']); 
          except Exception as e:
              print(e)
          " || echo "模型下载可能失败，但继续打包"

      - name: 执行 PyInstaller 打包
        run: |
          pyinstaller build_mac_arm64.spec

      - name: 构建标准的 .app 结构
        run: |
          mkdir -p "商委订单审核助手服务端 (M1版).app/Contents/MacOS"
          mkdir -p "商委订单审核助手服务端 (M1版).app/Contents/Resources"

          SOURCE_DIR="dist/app_contents_temp"

          if [ -d "$SOURCE_DIR" ]; then
            cp -r "$SOURCE_DIR"/* "商委订单审核助手服务端 (M1版).app/Contents/Resources/"
          else
            echo "错误：找不到源目录 $SOURCE_DIR"
            ls -la dist/
            exit 1
          fi

          mv "商委订单审核助手服务端 (M1版).app/Contents/Resources/商委订单审核助手服务端 (M1版)" "商委订单审核助手服务端 (M1版).app/Contents/MacOS/"

          cat > "商委订单审核助手服务端 (M1版).app/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>商委订单审核助手服务端 (M1版)</string>
            <key>CFBundleIdentifier</key>
            <string>com.example.swddzs.arm64</string>
            <key>CFBundleName</key>
            <string>商委订单审核助手服务端 (M1版)</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          mkdir -p dist_final
          mv 商委订单审核助手服务端\ \(M1版\).app dist_final/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: macOS-ARM64-App
          path: dist_final/

  # ===== 测试 Job：验证程序在干净 macOS 中能否正常启动 =====
  test-on-clean-macos:
    name: 🧪 验证 Web 服务启动 (干净环境)
    runs-on: macos-14
    needs: build
    
    steps:
      - name: 下载刚才打包好的 .app
        uses: actions/download-artifact@v4
        with:
          name: macOS-ARM64-App
          path: ./downloaded-app

      - name: 后台启动服务，检测就绪标志后终止
        run: |
          echo "=========================================="
          echo "📂 定位可执行文件..."
          echo "=========================================="
          
          APP_PATH="./downloaded-app/商委订单审核助手服务端 (M1版).app"
          EXECUTABLE="$APP_PATH/Contents/MacOS/商委订单审核助手服务端 (M1版)"
          
          chmod +x "$EXECUTABLE"
          echo "可执行文件路径: $EXECUTABLE"
          
          echo ""
          echo "=========================================="
          echo "🚀 后台启动服务（等待就绪标志）..."
          echo "=========================================="
          
          LOG_FILE=$(mktemp)
          
          "$EXECUTABLE" > "$LOG_FILE" 2>&1 &
          APP_PID=$!
          
          echo "服务进程 PID: $APP_PID"
          echo "等待服务启动并输出就绪信息..."
          
          READY=0
          for i in {1..90}; do   # 90秒超时，足够模型加载
            if grep -q "Uvicorn running on http://127.0.0.1:5678" "$LOG_FILE" 2>/dev/null; then
              READY=1
              echo "✅ 服务已就绪！"
              break
            fi
            sleep 1
          done
          
          echo ""
          echo "=========================================="
          echo "📋 服务启动日志 (前 80 行):"
          echo "=========================================="
          head -80 "$LOG_FILE"
          echo ""
          
          # 杀死进程
          kill $APP_PID 2>/dev/null || true
          wait $APP_PID 2>/dev/null || true
          
          echo "=========================================="
          echo "🔍 分析结果..."
          echo "=========================================="
          
          # 检查典型错误
          if grep -qi "Library not loaded" "$LOG_FILE"; then
            echo "❌❌❌ 检测到缺失动态库！"
            grep -i "Library not loaded" "$LOG_FILE" -A 2
            exit 1
          fi
          
          if grep -qi "ModuleNotFoundError" "$LOG_FILE"; then
            echo "❌❌❌ Python 模块缺失！"
            grep -i "ModuleNotFoundError" "$LOG_FILE" -A 2
            exit 1
          fi
          
          if grep -qiE "Segmentation fault|Abort trap|Bus error|Trace/BPT trap" "$LOG_FILE"; then
            echo "❌❌❌ 程序发生底层崩溃！"
            tail -20 "$LOG_FILE"
            exit 1
          fi
          
          if grep -q "Traceback (most recent call last)" "$LOG_FILE"; then
            echo "❌❌❌ 程序出现 Python 异常！"
            tail -30 "$LOG_FILE"
            exit 1
          fi
          
          if [ $READY -eq 1 ]; then
            echo "✅ 服务成功启动并输出就绪标志！"
            echo "✅ 依赖完整性验证通过，程序在干净 Mac 上可正常运行。"
          else
            echo "⚠️  未在 90 秒内检测到 'Uvicorn running' 标志。"
            echo "请检查上方日志，判断是加载缓慢还是启动失败。"
            # 如果日志中有 PaddleOCR/EasyOCR 字样，可能是加载慢，不视为失败
            if grep -q "PaddleOCR\|EasyOCR\|模型" "$LOG_FILE"; then
              echo "⚠️  日志中包含 OCR 模型相关输出，可能加载较慢，建议适当延长等待时间。"
            else
              echo "❌ 启动失败，请检查日志。"
              exit 1
            fi
          fi
          
          echo "=========================================="
          echo "📝 验证完成。"
          echo "=========================================="
