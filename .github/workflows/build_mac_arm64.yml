name: 打包 macOS 应用 (M1/M2/M3/M4 原生版)
on: 
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.9 (ARM64 原生环境)
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          architecture: 'arm64'

      - name: 安装依赖 (原生 ARM64)
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 预下载 OCR 模型 (确保模型文件存在)
        run: |
          python -c " 
          try:
              from paddleocr import PaddleOCR; ocr = PaddleOCR(use_angle_cls=True, lang='ch'); 
          except Exception as e:
              print(e)
          try:
              import easyocr; reader = easyocr.Reader(['ch_sim', 'en']); 
          except Exception as e:
              print(e)
          " || echo "模型下载可能失败，但继续打包"

      - name: 执行 PyInstaller 打包
        run: |
          pyinstaller build_mac_arm64.spec

      - name: 构建标准的 .app 结构
        run: |
          mkdir -p "商委订单审核助手服务端 (M1版).app/Contents/MacOS"
          mkdir -p "商委订单审核助手服务端 (M1版).app/Contents/Resources"

          SOURCE_DIR="dist/app_contents_temp"

          if [ -d "$SOURCE_DIR" ]; then
            cp -r "$SOURCE_DIR"/* "商委订单审核助手服务端 (M1版).app/Contents/Resources/"
          else
            echo "错误：找不到源目录 $SOURCE_DIR"
            ls -la dist/
            exit 1
          fi

          mv "商委订单审核助手服务端 (M1版).app/Contents/Resources/商委订单审核助手服务端 (M1版)" "商委订单审核助手服务端 (M1版).app/Contents/MacOS/"

          cat > "商委订单审核助手服务端 (M1版).app/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>商委订单审核助手服务端 (M1版)</string>
            <key>CFBundleIdentifier</key>
            <string>com.example.swddzs.arm64</string>
            <key>CFBundleName</key>
            <string>商委订单审核助手服务端 (M1版)</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          mkdir -p dist_final
          mv 商委订单审核助手服务端\ \(M1版\).app dist_final/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: macOS-ARM64-App
          path: dist_final/

  # ============================================
  # 以下是新加的测试 Job，模拟用户双击运行
  # ============================================
  test-on-clean-macos:
    name: 🧪 模拟用户双击运行 (干净环境)
    runs-on: macos-14            # 和打包时一样的 macOS 14 (M1 原生)
    needs: build                 # 必须等上面的 build 任务跑完
    
    steps:
      - name: 下载刚才打包好的 .app
        uses: actions/download-artifact@v4
        with:
          name: macOS-ARM64-App   # 必须和上面 upload-artifact 的 name 完全一致
          path: ./downloaded-app

      - name: 尝试启动并监听崩溃日志
        run: |
          echo "=========================================="
          echo "📂 正在模拟用户双击打开 .app ..."
          echo "=========================================="
          
          # 由于 app 名字带空格，需要用引号包起来
          open "./downloaded-app/商委订单审核助手服务端 (M1版).app"
          
          echo "⏳ 等待 15 秒，观察程序是否闪退..."
          sleep 15
          
          echo "=========================================="
          echo "🔍 检查系统崩溃日志 (最近 2 分钟内)..."
          echo "=========================================="
          
          # 查询程序相关的系统日志，名字包含 "商委订单审核助手"
          LOG_OUTPUT=$(log show --predicate 'processImagePath contains "商委订单审核助手"' --last 2m --style syslog 2>/dev/null || echo "")
          
          if [ -z "$LOG_OUTPUT" ]; then
            echo "✅ 未捕获到任何相关系统日志。程序可能正常启动或静默运行。"
            echo "⚠️  注意：如果程序有 GUI 窗口，它在 CI 环境中会瞬间启动然后退出（因为无显示器）。"
            echo "⚠️  本次测试主要验证：程序启动时是否因缺少依赖库而崩溃。"
          elif echo "$LOG_OUTPUT" | grep -qi "crash\|termination\|abort\|signal\|trace"; then
            echo "❌❌❌ 检测到崩溃迹象！日志如下："
            echo "----------------------------------------"
            echo "$LOG_OUTPUT"
            echo "----------------------------------------"
            echo "请重点关注上面日志中 'Library not loaded' 或 'dyld' 相关的行。"
            exit 1
          else
            echo "✅ 未发现明显崩溃关键词。日志内容如下（供参考）："
            echo "$LOG_OUTPUT"
          fi
          
          echo "=========================================="
          echo "📝 测试完成。如果程序依赖 GUI 交互，建议在真实 Mac 上做最终验证。"
          echo "=========================================="
