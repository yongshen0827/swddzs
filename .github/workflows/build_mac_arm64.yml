name: 打包 macOS 应用 (M1/M2/M3/M4 原生版)
on: 
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.9 (ARM64 原生环境)
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          architecture: 'arm64'

      - name: 安装依赖 (原生 ARM64)
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 预下载 OCR 模型 (确保模型文件存在)
        run: |
          python -c " 
          try:
              from paddleocr import PaddleOCR; ocr = PaddleOCR(use_angle_cls=True, lang='ch'); 
          except Exception as e:
              print(e)
          try:
              import easyocr; reader = easyocr.Reader(['ch_sim', 'en']); 
          except Exception as e:
              print(e)
          " || echo "模型下载可能失败，但继续打包"

      - name: 执行 PyInstaller 打包
        run: |
          pyinstaller build_mac_arm64.spec

      - name: 构建标准的 .app 结构
        run: |
          mkdir -p "商委订单审核助手服务端 (M1版).app/Contents/MacOS"
          mkdir -p "商委订单审核助手服务端 (M1版).app/Contents/Resources"

          SOURCE_DIR="dist/app_contents_temp"

          if [ -d "$SOURCE_DIR" ]; then
            cp -r "$SOURCE_DIR"/* "商委订单审核助手服务端 (M1版).app/Contents/Resources/"
          else
            echo "错误：找不到源目录 $SOURCE_DIR"
            ls -la dist/
            exit 1
          fi

          mv "商委订单审核助手服务端 (M1版).app/Contents/Resources/商委订单审核助手服务端 (M1版)" "商委订单审核助手服务端 (M1版).app/Contents/MacOS/"

          cat > "商委订单审核助手服务端 (M1版).app/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>商委订单审核助手服务端 (M1版)</string>
            <key>CFBundleIdentifier</key>
            <string>com.example.swddzs.arm64</string>
            <key>CFBundleName</key>
            <string>商委订单审核助手服务端 (M1版)</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          mkdir -p dist_final
          mv 商委订单审核助手服务端\ \(M1版\).app dist_final/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: macOS-ARM64-App
          path: dist_final/

  # ============================================
  # 以下是专门测试命令行程序的 Job
  # ============================================
  test-on-clean-macos:
    name: 🧪 验证 CLI 程序依赖完整性 (干净环境)
    runs-on: macos-14
    needs: build
    
    steps:
      - name: 下载刚才打包好的 .app
        uses: actions/download-artifact@v4
        with:
          name: macOS-ARM64-App
          path: ./downloaded-app

      - name: 直接运行二进制文件，检查是否缺库或崩溃
        run: |
          echo "=========================================="
          echo "📂 定位可执行文件..."
          echo "=========================================="
          
          APP_PATH="./downloaded-app/商委订单审核助手服务端 (M1版).app"
          EXECUTABLE="$APP_PATH/Contents/MacOS/商委订单审核助手服务端 (M1版)"
          
          # 赋予执行权限
          chmod +x "$EXECUTABLE"
          
          echo "可执行文件路径: $EXECUTABLE"
          echo ""
          echo "=========================================="
          echo "🚀 尝试运行程序（超时时间 10 秒）..."
          echo "=========================================="
          
          # 由于是命令行程序，可能读取 stdin 导致卡住，所以用 echo 给它一点输入
          OUTPUT=$(timeout 10s sh -c "echo '' | '$EXECUTABLE'" 2>&1) || EXIT_CODE=$?
          
          echo "程序退出码: $EXIT_CODE"
          echo ""
          echo "=========================================="
          echo "🔍 分析输出结果..."
          echo "=========================================="
          
          # 打印前 30 行输出，方便定位问题
          echo "$OUTPUT" | head -30
          echo ""
          
          # 1. 检查是否缺失动态库 (dyld)
          if echo "$OUTPUT" | grep -qi "Library not loaded"; then
            echo "❌❌❌ 检测到缺失动态库！"
            echo "----------------------------------------"
            echo "$OUTPUT" | grep -i "Library not loaded" -A 2
            echo "----------------------------------------"
            exit 1
          fi
          
          # 2. 检查是否有 Python 模块导入失败 (ModuleNotFoundError)
          if echo "$OUTPUT" | grep -qi "ModuleNotFoundError"; then
            echo "❌❌❌ Python 模块缺失！"
            echo "$OUTPUT" | grep -i "ModuleNotFoundError" -A 2
            exit 1
          fi
          
          # 3. 检查是否有明显的段错误或崩溃信号
          if echo "$OUTPUT" | grep -qiE "Segmentation fault|Abort trap|Bus error|Trace/BPT trap"; then
            echo "❌❌❌ 程序发生底层崩溃！"
            echo "$OUTPUT" | tail -20
            exit 1
          fi
          
          # 4. 根据退出码判断
          if [ "$EXIT_CODE" = "124" ]; then
            echo "⏰ 程序被 timeout 终止（可能正常运行但未主动退出，或等待输入）"
            echo "✅ 未检测到崩溃或缺库错误，依赖完整性验证通过。"
          elif [ "$EXIT_CODE" = "0" ]; then
            echo "✅ 程序正常结束 (退出码 0)，未发现依赖问题。"
          elif [ -n "$OUTPUT" ] && echo "$OUTPUT" | grep -q "Traceback (most recent call last)"; then
            echo "❌ 程序出现 Python 异常！"
            echo "$OUTPUT" | tail -30
            exit 1
          else
            echo "⚠️  程序退出码非零: $EXIT_CODE"
            echo "但未检测到典型崩溃特征，请检查上方输出判断是否可接受。"
          fi
          
          echo "=========================================="
          echo "📝 验证完成。"
          echo "=========================================="
