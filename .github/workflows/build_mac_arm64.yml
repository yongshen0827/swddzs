name: 打包 macOS 应用 (M1 Runner 构建 Intel 版 - 极速方案)

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.9"
  # 【核心魔法】强制所有 Python 编译和安装操作都针对 x86_64 架构
  ARCHFLAGS: "-arch x86_64"
  # 确保安装到正确的位置
  _PYTHON_HOST_PLATFORM: "macosx-10.9-x86_64"

jobs:
  build:
    # 使用 macos-14 (M1)，资源充足，速度快
    runs-on: macos-14
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    # ==========================================
    # 1. 设置 Python (使用 x86_64 版本)
    # ==========================================
    # 注意：macos-14 默认 Python 是 arm64。
    # 我们需要安装一个 x86_64 的 Python 解释器，或者利用架构标志。
    # 最稳妥的方式是利用 Homebrew 安装 x86_64 版本的 Python
    - name: 安装 x86_64 Python 环境
      run: |
        # 安装 x86_64 架构的 Python 3.9
        arch -x86_64 brew install python@3.9
        
        # 将 x86_64 Python 加入 PATH
        echo "/opt/homebrew/bin" >> $GITHUB_PATH
        
        # 验证版本 (确保是 x86_64)
        /opt/homebrew/bin/python3.9 --version
        file /opt/homebrew/bin/python3.9

    # ==========================================
    # 2. 安装依赖 (强制 x86_64)
    # ==========================================
    - name: 安装项目依赖
      run: |
        # 使用 x86_64 的 pip
        PYTHON_CMD="/opt/homebrew/bin/python3.9"
        PIP_CMD="/opt/homebrew/bin/pip3.9"
        
        $PIP_CMD install --upgrade pip
        
        # 因为设置了 ARCHFLAGS，pip 会自动下载 x86_64 的 wheel
        # 如果没有 wheel，它会尝试编译 x86_64 的源码
        $PIP_CMD install "numpy<1.22"
        $PIP_CMD install torch torchvision torchaudio
        $PIP_CMD install paddlepaddle
        $PIP_CMD install nuitka
        
        if [ -f requirements.txt ]; then
          $PIP_CMD install -r requirements.txt
        fi

    # ==========================================
    # 3. 执行 Nuitka 打包
    # ==========================================
    - name: 执行 Nuitka 打包
      run: |
        PYTHON_CMD="/opt/homebrew/bin/python3.9"
        
        # 使用 x86_64 的 Python 运行 Nuitka
        # 这样 Nuitka 看到的也是 x86_64 环境，不会报 arm64 错误
        $PYTHON_CMD -m nuitka \
          --standalone \
          --macos-create-app-bundle \
          --macos-app-name="商委订单审核助手服务端 (Intel版)" \
          --macos-app-icon=none \
          --jobs=2 \
          --output-dir=dist_nuitka \
          --remove-output \
          --nofollow-import-to=torch \
          --nofollow-import-to=numpy \
          --nofollow-import-to=PIL \
          --nofollow-import-to=paddle \
          main.py

    # ==========================================
    # 4. 手动注入依赖
    # ==========================================
    - name: 手动复制依赖到包内
      run: |
        echo "🔧 正在手动注入依赖库..."
        
        APP_PATH=$(find dist_nuitka -name "*.app" | head -n 1)
        LIB_PATH="$APP_PATH/Contents/MacOS"
        
        # 获取 x86_64 Python 的 site-packages
        PYTHON_CMD="/opt/homebrew/bin/python3.9"
        SITE_PACKAGES=$($PYTHON_CMD -c "import site; print(site.getsitepackages()[0])")
        
        # 复制核心库
        for pkg in torch numpy paddle torchvision; do
          if [ -d "$SITE_PACKAGES/$pkg" ]; then
            echo "📦 复制 $pkg..."
            cp -r "$SITE_PACKAGES/$pkg" "$LIB_PATH/"
          fi
        done
        
        if [ -d "$SITE_PACKAGES/PIL" ]; then
            cp -r "$SITE_PACKAGES/PIL" "$LIB_PATH/"
        fi

        echo "✅ 库注入完成"

    - name: 上传 Nuitka 产物
      uses: actions/upload-artifact@v4
      with:
        name: macOS-Intel-App
        path: dist_nuitka/商委订单审核助手服务端\ $Intel版$.app

  # ==========================================
  # 测试环节
  # ==========================================
  test-on-clean-macos:
    name: 🧪 验证 Web 服务启动
    # 注意：要在 M1 上运行 Intel 应用，必须使用 Rosetta 转译
    runs-on: macos-14
    needs: build
    steps:
    - name: 下载刚才打包好的 .app
      uses: actions/download-artifact@v4
      with:
        name: macOS-Intel-App
        path: ./downloaded-app

    - name: 启动服务并实时监控日志
      run: |
        APP_PATH=$(find ./downloaded-app -name "*.app" | head -n 1)
        EXEC_PATH="$APP_PATH/Contents/MacOS/main"
        chmod +x "$EXEC_PATH"
        
        # 在 M1 上运行 Intel 程序，需要 arch -x86_64
        arch -x86_64 "$EXEC_PATH" > server_output.log 2>&1 &
        
        echo "⏳ 等待服务启动..."
        MAX_WAIT=60
        WAIT_UNTIL=$(($(date +%s) + MAX_WAIT))
        
        while true; do
            if [ $(date +%s) -gt $WAIT_UNTIL ]; then
                echo "❌ 等待超时，服务未启动"
                cat server_output.log
                exit 1
            fi
            if grep -q "Uvicorn running on http://127.0.0.1:5678" server_output.log; then
                echo "✅ 服务启动成功"
                break
            fi
            sleep 2
        done

    - name: 最终连通性测试
      run: |
        echo "🔍 测试接口连通性..."
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:5678/ || echo "000")
        if [ "$HTTP_CODE" == "200" ] || [ "$HTTP_CODE" == "404" ]; then
            echo "✅ 接口响应正常 (HTTP $HTTP_CODE)"
        else
            echo "❌ 接口异常 (HTTP $HTTP_CODE)"
            cat server_output.log
            exit 1
        fi
