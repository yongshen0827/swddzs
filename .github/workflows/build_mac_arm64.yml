name: 打包 macOS ARM64 应用 (PyInstaller)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14  # Apple Silicon M1 虚拟机

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 预先下载 PaddleOCR 和 EasyOCR 模型
      run: |
        echo "📥 触发模型下载..."
        python -c "
        from paddleocr import PaddleOCR
        import easyocr
        # 只初始化不识别，强制下载模型文件
        ocr = PaddleOCR(use_angle_cls=True, lang='ch', show_log=False)
        reader = easyocr.Reader(['ch_sim', 'en'], gpu=False)
        print('✅ 模型下载完成')
        "

    - name: 执行 PyInstaller 打包
      run: |
        echo "📦 开始 PyInstaller 打包..."
        pyinstaller --onedir --clean --noconfirm build_mac_arm64.spec

    - name: 验证打包产物
      run: |
        APP_PATH="dist/商委订单审核助手服务端.app"
        if [ ! -d "$APP_PATH" ]; then
          echo "❌ 未生成 .app bundle"
          exit 1
        fi
        EXEC_PATH="$APP_PATH/Contents/MacOS/商委订单审核助手服务端"
        if [ ! -f "$EXEC_PATH" ]; then
          echo "❌ 可执行文件不存在"
          exit 1
        fi
        echo "✅ .app bundle 生成成功"

    - name: 启动服务并验证（可选）
      run: |
        APP_PATH="dist/商委订单审核助手服务端.app"
        EXEC_PATH="$APP_PATH/Contents/MacOS/商委订单审核助手服务端"
        chmod +x "$EXEC_PATH"
        
        # 后台启动
        "$EXEC_PATH" > server.log 2>&1 &
        SERVER_PID=$!
        
        # 等待最多 30 秒
        for i in {1..30}; do
          if grep -q "Uvicorn running on http://127.0.0.1:5678" server.log; then
            echo "✅ 服务启动成功"
            break
          fi
          sleep 1
        done
        
        # 测试健康接口
        curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5678/health || echo "⚠️ 健康检查失败"
        
        # 终止进程
        kill $SERVER_PID 2>/dev/null || true

    - name: 上传打包产物
      uses: actions/upload-artifact@v4
      with:
        name: macOS-ARM64-App
        path: dist/商委订单审核助手服务端.app
